services:
  workspace:
    build:
      context: ..
      dockerfile: infrastructure/docker/Dockerfile.devcontainer
    image: wedding-workspace:latest
    container_name: wedding-workspace
    volumes:
      - ..:/workspaces/wedding-inviter:cached
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - ../.env
    environment:
      TZ: America/Sao_Paulo
    init: true
    command: sleep infinity
    working_dir: /workspaces/wedding-inviter
    depends_on:
      postgres_wedding:
        condition: service_healthy
      redis_wedding:
        condition: service_healthy
    networks:
      - wedding-network
